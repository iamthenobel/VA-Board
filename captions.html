<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Caption Picker — Sequential Clipboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/feather-icons"></script>
  <style>
    /* Hide scrollbar for cleaner UI but keep functionality */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    .caption-item { transition: all 0.2s ease; }
    .active-copy { transform: scale(1.02); }
  </style>
</head>
<body class="bg-[#1a1a1a] text-gray-100 antialiased h-screen overflow-hidden flex flex-col">

  <main class="flex-1 overflow-y-auto p-6 pb-40 no-scrollbar">
    <div class="max-w-2xl mx-auto">
      <div aria-live="polite" id="feedback" class="text-xs font-mono text-gray-500 mb-4 uppercase tracking-widest">
        Initializing...
      </div>
      
      <ul id="captionList" class="space-y-3">
        </ul>
    </div>
  </main>

  <div class="fixed bottom-6 right-6 flex flex-col items-end gap-3 z-50">
    
    <div class="flex flex-col gap-2 bg-[#252525] p-2 rounded-2xl border border-[#3a3a3a] shadow-2xl transition-all scale-90 origin-bottom-right hover:scale-100">
      
      <div class="relative">
        <select id="fileSelect" class="w-full bg-[#333333] text-white text-xs rounded-xl px-4 py-2.5 border border-[#444] appearance-none focus:outline-none focus:ring-1 focus:ring-blue-500 cursor-pointer mr-6">
          <option value="captions.json" selected>English 1.0</option>
          <option value="captions3.json">English 2.0</option>
          <option value="captions4.json">Italian</option>
          <option value="cta.json">Call To Action (CTA)</option>
        </select>
        <div class="absolute right-3 top-2.5 pointer-events-none text-gray-400">
          <i data-feather="chevron-up" class="w-4 h-4"></i>
        </div>
      </div>

      <div class="flex border-t border-[#3a3a3a] pt-2 gap-1 justify-center">
        <a href="index.html" class="p-2 hover:bg-[#3b3b3b] rounded-lg text-gray-400 hover:text-white" title="Home"><i data-feather="home" class="w-4 h-4"></i></a>
        <a href="sop.html" class="p-2 hover:bg-[#3b3b3b] rounded-lg text-gray-400 hover:text-white" title="SOP"><i data-feather="layers" class="w-4 h-4"></i></a>
      </div>
    </div>

    <button id="copyBtn"
            class="group flex items-center gap-3 px-8 py-4 rounded-2xl bg-blue-600 hover:bg-blue-500 active:scale-95 transition-all text-white shadow-[0_0_20px_rgba(37,99,235,0.3)] text-lg font-bold"
            title="Copy 5 random captions">
      <i data-feather="copy" class="group-hover:rotate-12 transition-transform"></i>
      <span>Copy Sequential</span>
    </button>
  </div>

 <script>
  const sleep = ms => new Promise(res => setTimeout(res, ms));
  const copyBtn = document.getElementById('copyBtn');
  const feedback = document.getElementById('feedback');
  const captionListEl = document.getElementById('captionList');
  const fileSelect = document.getElementById('fileSelect');

  let captions = [];
  let captionNodes = [];

  function isCTA() {
    return fileSelect.value === "cta.json";
  }

  async function loadCaptions(file) {
    try {
      const res = await fetch(file);
      const data = await res.json();
      captions = data.captions || [];

      captionListEl.innerHTML = '';

      captions.forEach((caption, index) => {
        const li = document.createElement('li');
        li.className = "caption-item flex justify-between items-center gap-3 p-4 rounded-xl bg-[#252525] border border-[#333] shadow-sm text-gray-300 text-sm";

        const text = document.createElement('span');
        text.className = "flex-1";
        text.textContent = caption;

        li.appendChild(text);

        // 👉 ONLY add per-item copy buttons for CTA
        if (isCTA()) {
          const btn = document.createElement('button');
          btn.className = "px-3 py-1 text-xs bg-blue-600 hover:bg-blue-500 rounded-lg";
          btn.textContent = "Copy";

          btn.addEventListener('click', async () => {
            await writeToClipboard(caption);
            feedback.textContent = "Copied 1 CTA";
          });

          li.appendChild(btn);
        }

        captionListEl.appendChild(li);
      });

      captionNodes = Array.from(document.querySelectorAll('.caption-item'));
      feedback.textContent = `Source: ${file} (${captions.length} items)`;

      // Update button label dynamically
      copyBtn.querySelector("span").textContent = isCTA()
        ? "Copy 1 Random CTA"
        : "Copy Sequential";

    } catch (err) {
      feedback.textContent = `Error loading ${file}`;
    }
  }

  function pickRandomIndices(n, count) {
    const indices = Array.from({length: n}, (_, i) => i);
    for (let i = n - 1; i > n - 1 - count && i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [indices[i], indices[j]] = [indices[j], indices[i]];
    }
    return indices.slice(Math.max(0, n - count)).slice(0, count);
  }

  function highlightNode(index, active) {
    const node = captionNodes[index];
    if (!node) return;
    if (active) {
      node.classList.add('ring-2', 'ring-blue-500', 'bg-[#2a2d35]', 'active-copy', 'border-transparent');
    } else {
      node.classList.remove('ring-2', 'ring-blue-500', 'bg-[#2a2d35]', 'active-copy', 'border-transparent');
    }
  }

  async function writeToClipboard(text) {
    if (navigator.clipboard && navigator.clipboard.write) {
      const blob = new Blob([text], { type: 'text/plain' });
      const item = new ClipboardItem({'text/plain': blob});
      await navigator.clipboard.write([item]);
    } else {
      await navigator.clipboard.writeText(text);
    }
  }

  copyBtn.addEventListener('click', async () => {
    if (captions.length === 0) return;

    copyBtn.disabled = true;
    copyBtn.classList.add('opacity-50', 'cursor-not-allowed');

    try {
      // 👉 CTA MODE: copy ONLY 1 random
      if (isCTA()) {
        const idx = Math.floor(Math.random() * captions.length);
        highlightNode(idx, true);

        await writeToClipboard(captions[idx]);
        feedback.textContent = "Copied 1 Random CTA";

        await sleep(300);
        highlightNode(idx, false);
      } else {
        // 👉 NORMAL MODE: unchanged (5 sequential)
        const count = Math.min(5, captions.length);
        const indices = pickRandomIndices(captions.length, count);

        for (let i = 0; i < indices.length; i++) {
          const idx = indices[i];
          highlightNode(idx, true);
          feedback.textContent = `Progress: ${i + 1} / ${indices.length}`;

          await writeToClipboard(captions[idx]);
          await sleep(250);
          highlightNode(idx, false);
        }

        feedback.textContent = "Sequential Copy Complete";
      }
    } catch (err) {
      feedback.textContent = "Clipboard Error";
      console.error(err);
    } finally {
      copyBtn.disabled = false;
      copyBtn.classList.remove('opacity-50', 'cursor-not-allowed');
      setTimeout(() => feedback.textContent = `Source: ${fileSelect.value}`, 3000);
    }
  });

  loadCaptions(fileSelect.value);
  fileSelect.addEventListener('change', () => loadCaptions(fileSelect.value));
  feather.replace();
</script>
</body>
</html>
