<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>T#B VA — SOP</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/feather-icons"></script>

  <style>
    html, body {
      overflow: hidden;
    }

    .slider {
      scroll-snap-type: x mandatory;
      overflow-x: auto;
      display: flex;
      height: 100%;
      scroll-behavior: smooth;
    }

    .slide {
      scroll-snap-align: start;
      scroll-snap-stop: always; /* 🔥 force stop */
      flex: 0 0 100%;
      height: 100%;
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      overscroll-behavior: contain; /* 🔥 prevents scroll leak */
    }

    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { scrollbar-width: none; }

    .fade-in {
      animation: fade 0.6s ease;
    }

    @keyframes fade {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body class="bg-[#1a1a1a] text-gray-100 h-screen flex flex-col">

  <!-- Header -->
  <header class="p-4 border-b border-[#2a2a2a] flex justify-between items-center">
    <h1 class="text-sm font-bold tracking-wide">T#B VA — SOP</h1>
    <span class="text-xs text-gray-500">Swipe →</span>
  </header>

  <!-- Slider -->
  <main class="flex-1 overflow-hidden">
    <div id="slider" class="slider no-scrollbar">

      <!-- Intro -->
      <section class="slide flex items-center justify-center p-6">
        <div class="text-center fade-in">
          <h2 class="text-2xl font-semibold mb-3">SOP Dashboard</h2>
          <p class="text-gray-400 text-sm mb-6">Swipe to begin</p>
          <div class="animate-pulse text-gray-500 flex justify-center">
            <i data-feather="arrow-right"></i>
          </div>
        </div>
      </section>

      <!-- SOP 2 -->
      <section class="slide">
        <div class="h-full flex flex-col">
          <div class="p-3 text-xs text-gray-400 border-b border-[#2a2a2a]">
            SOP 2.0 — Active Posting
          </div>
          <iframe src="https://docs.google.com/document/d/1EfBxGIyU-mS2Pfs9ZLiplMAM6mTkUAW623IrS35z2xA/edit?usp=sharing"></iframe>
        </div>
      </section>

      <!-- SOP 3 -->
      <section class="slide">
        <div class="h-full flex flex-col">
          <div class="p-3 text-xs text-gray-400 border-b border-[#2a2a2a]">
            SOP 3.0 — Antiban
          </div>
          <iframe src="https://docs.google.com/document/d/1el26HUvJk22HXbSIuCxDjhTGASXupBKeP5lJEJoXACo/edit?usp=drivesdk"></iframe>
        </div>
      </section>

    </div>
  </main>

  <!-- Floating Controls -->
  <div class="fixed bottom-6 right-6 flex flex-col items-end gap-3 z-50">
    <div class="flex flex-col gap-2 bg-[#252525] p-2 rounded-2xl border border-[#3a3a3a] shadow-2xl scale-90 hover:scale-100 transition-all">

      <a href="index.html" class="p-2 hover:bg-[#3b3b3b] rounded-lg text-gray-400 hover:text-white">
        <i data-feather="home"></i>
      </a>

      <button id="prevBtn" class="p-2 hover:bg-[#3b3b3b] rounded-lg text-gray-400 hover:text-white">
        <i data-feather="chevron-left"></i>
      </button>

      <button id="nextBtn" class="p-2 hover:bg-[#3b3b3b] rounded-lg text-gray-400 hover:text-white">
        <i data-feather="chevron-right"></i>
      </button>

    </div>
  </div>

  <script>
    feather.replace();

    const slider = document.getElementById('slider');
    const slides = document.querySelectorAll('.slide');
    let current = 0;
    let isSnapping = false;

    function goToSlide(index) {
      current = Math.max(0, Math.min(index, slides.length - 1));
      isSnapping = true;

      slider.scrollTo({
        left: slider.clientWidth * current,
        behavior: 'smooth'
      });

      setTimeout(() => isSnapping = false, 400);
    }

    document.getElementById('nextBtn').onclick = () => goToSlide(current + 1);
    document.getElementById('prevBtn').onclick = () => goToSlide(current - 1);

    // 🔥 HARD LOCK snapping (fix drifting / multi-scroll)
    let scrollTimeout;
    slider.addEventListener('scroll', () => {
      if (isSnapping) return;

      clearTimeout(scrollTimeout);
      scrollTimeout = setTimeout(() => {
        const index = Math.round(slider.scrollLeft / slider.clientWidth);
        goToSlide(index);
      }, 120);
    });
  </script>

</body>
</html>
