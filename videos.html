<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Video Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/feather-icons"></script>
    <style>
        /* Anti-Copy Protection */
        * {
            -webkit-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            outline: none;
        }

        body, html { 
            height: 100%; margin: 0; overflow: hidden; background: #000;
            overscroll-behavior-y: none; font-family: 'Inter', sans-serif;
        }

        /* Global Loader Styling */
        #global-loader {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }

        .snap-container {
            height: 100vh;
            overflow-y: scroll;
            /* Snap is toggled via JS for the hint */
            scrollbar-width: none;
            scroll-behavior: smooth; 
        }
        .snap-container::-webkit-scrollbar { display: none; }

        .snap-section {
            height: 100vh;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            position: relative;
        }

        video::-webkit-media-controls { display: none !important; }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
            cursor: pointer;
            width: 100%;
        }

        .progress-slider {
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
        }

        .progress-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 14px; width: 14px;
            background: #fff; border-radius: 50%;
        }

        .fade-out { animation: fadeOut 0.4s ease-out forwards; }
        @keyframes fadeOut {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.4); }
        }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="global-loader">
    <div class="w-12 h-12 border-4 border-white/10 border-t-white rounded-full animate-spin mb-4"></div>
    <p class="text-white text-xs font-bold tracking-widest uppercase opacity-50">Loading Feed</p>
</div>

<div id="feed" class="snap-container"></div>

<script>
    const videoData = [
        { id: 1, src: 'media/video1.MOV', caption: 'How to setup and warmup instagram account' },
        { id: 2, src: 'media/setup.mp4', caption: 'Setting up your threads profile.' },
        { id: 3, src: 'media/threadswarmup.mp4', caption: 'How to warmup threads account properly.' },
        { id: 4, src: 'media/report.mp4', caption: 'How to make a screen record for your report.' },
        { id: 5, src: 'media/updatesheet.mp4', caption: 'How to update your account on the sheet.' },
        { id: 6, src: 'media/posting.mp4', caption: 'Threads normal posting.' },
        { id: 7, src: 'media/pinnedpost.mp4', caption: 'How to create pinned post (Where you make money).' },
        { id: 8, src: 'media/reply.mp4', caption: 'Replying to your comments.' },
    ];

    const feed = document.getElementById('feed');
    const globalLoader = document.getElementById('global-loader');

    function formatTime(seconds) {
        if (isNaN(seconds)) return "0:00";
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
    }

    function createVideoSlide(data) {
        const section = document.createElement('div');
        section.className = 'snap-section flex flex-col justify-center bg-black';
        
        section.innerHTML = `
            <video class="w-full h-full object-contain" src="${data.src}" loop playsinline muted></video>

            <div class="speed-badge opacity-0 absolute top-12 left-1/2 -translate-x-1/2 z-50 pointer-events-none transition-opacity duration-200">
                <div class="bg-white/20 backdrop-blur-xl border border-white/20 px-4 py-2 rounded-full flex items-center gap-2">
                    <div class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></div>
                    <span class="text-white text-[10px] font-bold tracking-widest uppercase speed-text">2X Speed</span>
                </div>
            </div>

            <div class="absolute inset-0 flex items-center justify-center pointer-events-none z-40">
                <div class="state-icon opacity-0 bg-white/10 backdrop-blur-md p-6 rounded-full border border-white/10">
                    <i data-feather="play" class="text-white w-10 h-10 fill-current"></i>
                </div>
            </div>

            <div class="absolute bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-black/95 via-black/20 to-transparent z-20">
                <div class="flex items-end justify-between mb-6">
                    <div class="max-w-[70%]">
                        <p class="text-white text-sm font-medium leading-relaxed drop-shadow-md">${data.caption}</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <button class="mute-btn p-3 bg-white/10 backdrop-blur-md rounded-2xl border border-white/10 active:scale-90 transition-transform">
                            <i data-feather="volume-x" class="text-white w-5 h-5"></i>
                        </button>
                        <a href="${data.src}" download class="p-3 bg-white/10 backdrop-blur-md rounded-2xl border border-white/10 active:scale-90 transition-transform">
                            <i data-feather="download" class="text-white w-5 h-5"></i>
                        </a>
                    </div>
                </div>

                <div class="progress-area flex flex-col gap-2 pointer-events-auto">
                    <div class="flex justify-between text-[10px] text-white/50 font-mono">
                        <span class="current-time">0:00</span>
                        <span class="total-duration">0:00</span>
                    </div>
                    <input type="range" class="progress-slider" min="0" max="100" value="0" step="0.01">
                </div>
            </div>
        `;

        handleLogic(section);
        return section;
    }

    function handleLogic(el) {
        const video = el.querySelector('video');
        const stateIcon = el.querySelector('.state-icon');
        const iconInner = stateIcon.querySelector('i');
        const speedBadge = el.querySelector('.speed-badge');
        const speedText = el.querySelector('.speed-text');
        const slider = el.querySelector('.progress-slider');
        const currentTimeText = el.querySelector('.current-time');
        const durationText = el.querySelector('.total-duration');
        const muteBtn = el.querySelector('.mute-btn');

        let isDragging = false;
        let holdTimer;
        let isHolding = false;

        video.onloadedmetadata = () => {
            durationText.innerText = formatTime(video.duration);
            slider.max = video.duration;
        };

        video.ontimeupdate = () => {
            if (!isDragging) {
                slider.value = video.currentTime;
                currentTimeText.innerText = formatTime(video.currentTime);
                const pct = (slider.value / slider.max) * 100;
                slider.style.background = `linear-gradient(to right, #fff ${pct}%, rgba(255,255,255,0.2) ${pct}%)`;
            }
        };

        slider.addEventListener('input', () => {
            isDragging = true;
            video.currentTime = slider.value;
            currentTimeText.innerText = formatTime(slider.value);
        });
        slider.addEventListener('change', () => { isDragging = false; });

        const startHold = (x) => {
            const width = window.innerWidth;
            holdTimer = setTimeout(() => {
                isHolding = true;
                if (x > width * 0.7) {
                    video.playbackRate = 2.0;
                    speedText.innerText = "2X Fast Forward";
                    speedBadge.style.opacity = "1";
                } else if (x < width * 0.3) {
                    video.playbackRate = 0.5;
                    speedText.innerText = "0.5X Slow Motion";
                    speedBadge.style.opacity = "1";
                }
            }, 350);
        };

        const endHold = () => {
            clearTimeout(holdTimer);
            video.playbackRate = 1.0;
            speedBadge.style.opacity = "0";
            setTimeout(() => { isHolding = false; }, 50);
        };

        muteBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            video.muted = !video.muted;
            muteBtn.innerHTML = `<i data-feather="${video.muted ? 'volume-x' : 'volume-2'}" class="text-white w-5 h-5"></i>`;
            feather.replace();
        });

        el.addEventListener('mousedown', (e) => startHold(e.clientX));
        el.addEventListener('mouseup', endHold);
        el.addEventListener('touchstart', (e) => { if(!e.target.closest('input')) startHold(e.touches[0].clientX); });
        el.addEventListener('touchend', endHold);

        el.addEventListener('click', (e) => {
            if (e.target.closest('a') || e.target.closest('input') || e.target.closest('button') || isHolding) return;
            if (video.paused) { video.play(); animateIcon('play'); }
            else { video.pause(); animateIcon('pause'); }
        });

        function animateIcon(name) {
            iconInner.setAttribute('data-feather', name);
            feather.replace();
            stateIcon.classList.remove('fade-out', 'opacity-0');
            void stateIcon.offsetWidth; 
            stateIcon.classList.add('fade-out');
        }
    }

    // --- ENHANCED SCROLL HINT & LOADER REMOVAL ---
    function triggerScrollHint() {
        // Disable snap momentarily to allow free hint movement
        feed.style.scrollSnapType = "none";
        
        setTimeout(() => {
            feed.scrollTo({ top: 120, behavior: 'smooth' });
            setTimeout(() => {
                feed.scrollTo({ top: 0, behavior: 'smooth' });
                // Re-enable snap after hint finishes
                setTimeout(() => {
                    feed.style.scrollSnapType = "y mandatory";
                }, 500);
            }, 600);
        }, 300);
    }

    // Initialize Feed
    videoData.forEach(item => feed.appendChild(createVideoSlide(item)));
    feather.replace();

    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            const video = entry.target.querySelector('video');
            if (entry.isIntersecting) {
                video.play().catch(() => {});
            } else {
                video.pause();
                video.currentTime = 0;
            }
        });
    }, { threshold: 0.8 });

    document.querySelectorAll('.snap-section').forEach(s => observer.observe(s));

    // Handle Page Ready
    window.addEventListener('load', () => {
        // Wait for the first video to be ready before removing loader
        const firstVideo = document.querySelector('video');
        const removeLoader = () => {
            globalLoader.style.opacity = '0';
            setTimeout(() => {
                globalLoader.remove();
                triggerScrollHint(); // Hint plays immediately after loading
            }, 500);
        };

        if (firstVideo.readyState >= 3) {
            removeLoader();
        } else {
            firstVideo.addEventListener('canplay', removeLoader, { once: true });
        }
    });
</script>
</body>
</html>
